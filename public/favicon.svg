<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#070707"/>
  <!-- Crimson top bar -->
  <rect x="0" y="0" width="32" height="3" rx="0" fill="#C41E1E"/>
  <rect x="0" y="0" width="10" height="3" rx="2" fill="#C41E1E"/>
  <rect x="0" y="0" width="32" height="3" fill="#C41E1E"/>
  <!-- Bold A letter, drawn as paths for crisp rendering -->
  <!-- Left leg -->
  <polygon points="7,26 12,8 14,8 9.5,26" fill="white"/>
  <!-- Right leg -->
  <polygon points="25,26 20,8 18,8 22.5,26" fill="white"/>
  <!-- Crossbar -->
  <rect x="10.5" y="18" width="11" height="2.5" rx="0.5" fill="white"/>
</svg>
